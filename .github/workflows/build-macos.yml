name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'              # 当你推送 v1.0.0, v2.1 等标签时自动触发
  workflow_dispatch:      # 保留手动触发按钮，方便测试（但手动触发不会自动建Release，除非传参）

permissions:
  contents: write         # 关键！允许 Actions 往 Release 里上传文件

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # 打包 Mac 版本（dmg / zip）
      - name: Build macOS app
        run: npx electron-builder --mac --publish never

      # 一键上传到 Release！
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*    # electron-builder 默认输出目录
          generate_release_notes: true   # 自动根据 commit 生成 Release 说明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
